services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: portaria_facil
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/portaria_facil
      PUBLIC_APP_URL: http://localhost:8080
      DEFAULT_TENANT_ID: default
      DEFAULT_TENANT_SLUG: default
      EMPLOYEE_SESSION_SECRET: change-me
      EMPLOYEE_PASSWORD_ITERATIONS: 120000
      EMPLOYEE_SESSION_TTL_SECONDS: 43200
      BOOTSTRAP_ADMIN_NAME: Administrador
      BOOTSTRAP_ADMIN_USERNAME: admin
      BOOTSTRAP_ADMIN_PASSWORD: change-me-now
      TENANT_PROVISION_MODE: schema
      TENANT_DB_PREFIX: tenant
      CRON_SECRET: change-me-cron
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "4000:4000"

  queue-worker:
    image: curlimages/curl:8.12.1
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      CRON_SECRET: change-me-cron
    command:
      - /bin/sh
      - -c
      - |
        while true; do
          curl -fsS -X POST -H "x-cron-secret: $$CRON_SECRET" http://backend:4000/api/functions/processNotificationQueue || true
          sleep 60
        done

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_SELF_HOSTED: "true"
        VITE_SELF_HOSTED_API_URL: ""
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  postgres_data:
  uploads_data:
